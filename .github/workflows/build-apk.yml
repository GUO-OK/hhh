name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Verify Flutter installation
        run: |
          echo "=== Flutter 版本 ==="
          flutter --version
          echo "=== Flutter 路径 ==="
          which flutter
          echo "=== Flutter Doctor ==="
          flutter doctor -v

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: List Python files
        run: |
          echo "=== 所有 Python 文件 ==="
          find . -name "*.py" -type f

      - name: Build APK
        run: |
          # 确保 Flutter 在 PATH 中
          export PATH="$PATH:$HOME/flutter/bin"
          echo "PATH: $PATH"
          
          # 检查 main.py
          if [ ! -f "main.py" ]; then
            echo "错误：未找到 main.py"
            exit 1
          fi
          
          # 构建 APK
          flet build apk --org com.yourcompany.travelapp --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/apk/
