name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Flutter 3.41.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Verify Flutter
        run: |
          flutter --version
          which flutter
          flutter doctor -v

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: List Python files
        run: |
          find . -name "*.py" -type f

      - name: Build APK
        run: |
          if [ ! -f "main.py" ]; then
            echo "错误：未找到 main.py"
            exit 1
          fi
          flet build apk --org com.yourcompany.travelapp --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/apk/
