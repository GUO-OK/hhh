name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Install Flutter
        run: |
          # 下载 Flutter
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable
          cd flutter
          # 切换到特定版本
          git checkout 3.24.0
          cd ..
          
          # 添加到 PATH
          echo "$(pwd)/flutter/bin" >> $GITHUB_PATH
          
          # 验证 Flutter 安装
          flutter doctor
          
          # 预接受 Android 许可证
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: |
          pip install flet
          
      - name: Build APK
        run: |
          # 确保 Flutter 在 PATH 中
          export PATH="$PATH:$(pwd)/flutter/bin"
          
          # 使用非交互模式构建
          flet build apk --org com.yourcompany.travelapp
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/apk/
