name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Flutter 3.41.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install Flet and dependencies
        run: |
          pip install --upgrade pip
          pip install flet python-dotenv requests

      - name: Create .env file from Secrets
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" > .env
          echo "DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}" >> .env
          echo "DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}" >> .env
          echo ".env 文件创建成功"
          cat .env

      - name: Verify database.db
        run: |
          if [ ! -f "database.db" ]; then
            echo "database.db 不存在，将使用空数据库"
            python -c "import sqlite3; conn = sqlite3.connect('database.db'); conn.close()"
          else
            ls -lh database.db
          fi

      - name: Build APK
        run: |
          if [ ! -f "main.py" ]; then
            echo "错误：未找到 main.py"
            exit 1
          fi
          flet build apk --org com.yourcompany.travelapp --verbose

      - name: Find and upload APK
        run: |
          echo "查找生成的 APK 文件..."
          find build -name "*.apk" -type f
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/**/*.apk
