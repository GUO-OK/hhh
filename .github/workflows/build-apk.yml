name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet
      - name: Build APK
        run: |
          flet build apk --org com.yourcompany.travelapp
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/apk/
