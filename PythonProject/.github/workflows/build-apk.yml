name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List project files
        run: |
          echo "=== 项目根目录内容 ==="
          ls -la
          echo "=== 查找所有 Python 文件 ==="
          find . -name "*.py" -type f

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Verify environment
        run: |
          flutter --version
          flutter doctor -v

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          # 检查 main.py 是否存在
          if [ ! -f "main.py" ]; then
            echo "错误：未找到 main.py 文件"
            echo "请在项目根目录创建 main.py 文件"
            exit 1
          fi
          flet build apk --org com.yourcompany.travelapp

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-apk
          path: build/apk/
